<!DOCTYPE html>
<html lang="ru"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>КАЛЬКУЛЯТОР 2.0</title>
<style>
  body {
    font-family: Helvetica, sans-serif;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f0f0f0;
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
  }
  .calculator-container {
    max-width: 375px;
    width: 100%;
    margin: 0 auto;
    padding: 20px;
    border: 4px solid #000;
    border-radius: 8px;
    background-color: white;
    position: relative;
  }
  #example {
    text-align: center;
    font-weight: bold;
    font-size: 3em;
    margin-top: 10px;
    margin-bottom: 0px;
  }
  #score {
    position: absolute;
    top: 12px;
    right: 12px;
    font-weight: bold;
    font-size: 1.2em;
  }
  #result {
    text-align: center;
    margin-top: 5px;
    margin-bottom: 5px;
    height: 20px;
    font-weight: bold;
    font-size: 1em;
    color: green;
  }
  #display {
    width: 95.5%;
    height: 40px;
    font-size: 1.2em;
    text-align: right;
    margin-bottom: 10px;
    padding: 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  button {
    width: 22%;
    height: 80px;
    font-size: 2em;
    margin: 1%;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: #000000;
    color: white;
    transition: background-color 0.3s;
  }
  button:hover {
    background-color: #222222;
  }
  #timer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 6px;
    background-color: #2196F3;
    width: 0%;
    transition: width 0.1s linear;
  }
</style>
</head>
<body>

<div class="calculator-container">
  <h2 id="example">16 + 5 = ?</h2>
  <div id="score">27</div>
  <div id="result"></div>

  <input type="text" id="display">

  <div>
    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button onclick="appendOperator('/')">/</button>
  </div>
  <div>
    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button onclick="appendOperator('*')">*</button>
  </div>
  <div>
    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button onclick="appendOperator('-')">-</button>
  </div>
  <div>
    <button onclick="appendNumber('0')">0</button>
    <button onclick="appendNumber('.')">.</button>
    <button onclick="clearDisplay()">C</button>
    <button onclick="appendOperator('+')">+</button>
  </div>
  <div>
    <button style="width: 97.5%" onclick="checkAnswer()">=</button>
  </div>
</div>

<div id="timer-bar" style="width: 12.16%;"></div>

<script>
  const display = document.getElementById('display');
  const exampleEl = document.getElementById('example');
  const scoreEl = document.getElementById('score');
  const timerBar = document.getElementById('timer-bar');
  const resultEl = document.getElementById('result');

  let currentExample = '';
  let correctAnswer = 0;
  let score = 0;

  const TIMER_DURATION = 10000;
  let timerInterval = null;

  function generateExample() {
    let num1, num2, op, resultValue;
    let attempts = 0;
    const maxAttempts = 30;
    let valid = false;

    while (!valid && attempts < maxAttempts) {
      num1 = Math.floor(Math.random() * 20) + 1;
      num2 = Math.floor(Math.random() * 20) + 1;
      
      if (Math.random() < 0.25) {
        op = '/';
        if (num2 !== 0 && (num1 % num2 === 0)) {
          resultValue = num1 / num2;
          if (Number.isInteger(resultValue)) {
            valid = true;
          }
        }
      } else {
        const ops = ['+', '-', '*'];
        op = ops[Math.floor(Math.random() * ops.length)];
        switch (op) {
          case '+': 
            resultValue = num1 + num2;
            valid = true;
            break;
          case '-': 
            resultValue = num1 - num2;
            valid = true;
            break;
          case '*': 
            resultValue = num1 * num2;
            valid = true;
            break;
        }
      }
      attempts++;
    }

    if (!valid) {
      num1 = 12;
      num2 = 3;
      op = '/';
      resultValue = 4;
    }

    currentExample = `${num1} ${op} ${num2}`;
    correctAnswer = resultValue;

    let displayOp = op;
    if (op === '*') displayOp = '*';
    if (op === '/') displayOp = '/';
    exampleEl.textContent = `${num1} ${displayOp} ${num2} = ?`;
    resultEl.textContent = '';
    resetTimer();
  }

  function resetTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
    }
    let startTime = Date.now();
    timerBar.style.width = '0%';

    timerInterval = setInterval(() => {
      const elapsed = Date.now() - startTime;
      const progress = Math.min(elapsed / TIMER_DURATION, 1);
      timerBar.style.width = (progress * 100) + '%';

      if (progress >= 1) {
        clearInterval(timerInterval);
        checkAnswer(true);
      }
    }, 100);
  }

  function clearDisplay() {
    display.value = '';
  }

  function appendNumber(num) {
    display.value += num;
  }

  function appendOperator(op) {
    if (display.value === '') {
      if (op === '-') {
        display.value = '-';
      }
      return;
    }
    const lastChar = display.value.slice(-1);
    if (['+', '-', '*', '/'].includes(lastChar)) {
      display.value = display.value.slice(0, -1) + op;
    } else {
      display.value += op;
    }
  }

  function checkAnswer(timerExpired = false) {
    if (timerInterval) {
      clearInterval(timerInterval);
    }
    timerBar.style.width = '100%';

    const userInput = display.value.trim();
    resultEl.textContent = '';

    if (timerExpired) {
      let correctFormatted = correctAnswer;
      if (typeof correctAnswer === 'number') {
        correctFormatted = parseFloat(correctAnswer.toFixed(2));
      }
      resultEl.textContent = `Время вышло! Правильный ответ: ${correctFormatted}`;
      generateExample();
      return;
    }

    if (userInput === '') {
      resultEl.textContent = 'Введите ответ!';
      generateExample();
      return;
    }

    let result;
    try {
      result = eval(userInput);
      if (typeof result === 'number') {
        result = parseFloat(result.toFixed(10));
      }
    } catch (e) {
      resultEl.textContent = 'Некорректный ввод!';
      generateExample();
      return;
    }

    if (isNaN(result) || !isFinite(result)) {
      resultEl.textContent = 'Некорректный ввод!';
      generateExample();
      return;
    }

    const expectedRounded = parseFloat(correctAnswer.toFixed(2));
    const userRounded = parseFloat(result.toFixed(2));

    if (userRounded === expectedRounded) {
      score++;
      resultEl.textContent = 'Правильно!';
    } else {
      let correctFormatted = expectedRounded;
      resultEl.textContent = `Неправильно! Правильный ответ: ${correctFormatted}`;
    }

    scoreEl.textContent = `${score}`;
    clearDisplay();
    generateExample();
  }

  generateExample();
</script>

</body></html>
